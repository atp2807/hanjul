# 백엔드 lint/format — ruff (flake8+isort+black 대체)
[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src"]
extend-exclude = ["migrations", ".venv", ".venv312"]

[tool.ruff.lint]
# E/F=pycodestyle+pyflakes, I=isort, B=bugbear, UP=pyupgrade, SIM=simplify, PT=pytest-style, ASYNC=async 함정
select = ["E", "F", "I", "B", "UP", "SIM", "PT", "ASYNC"]
# B008: FastAPI Depends() 관용 · E501: 길이는 format 담당 · B904: 예외 from 체이닝(점진 채택)
ignore = ["B008", "E501", "B904", "SIM117"]

[tool.ruff.lint.per-file-ignores]
# PT018: `assert a and b` 복합 단언이 27개 파일에 48건 산재(이번 정리 범위 밖 기존 스타일) —
# 전부 쪼개면 무관 파일 대량 리팩터라 점진 채택 보류, 신규 코드는 분리 지향.
"tests/**" = ["E501", "B008", "PT011", "PT018"]

[tool.ruff.format]
quote-style = "double"

# 아키텍처 경계 — import-linter (헥사고날 레이어 방향 + engine/features 분리 하드가드)
[tool.importlinter]
root_package = "src"
include_external_packages = true

[[tool.importlinter.contracts]]
name = "features 헥사고날 레이어 — presentation → infrastructure → application → domain"
type = "layers"
containers = ["src.features.*"]
layers = [
    "presentation",
    "infrastructure",
    "application",
    "domain",
]

[[tool.importlinter.contracts]]
name = "domain 계층은 FastAPI/SQLAlchemy를 모른다 (순수 도메인)"
type = "forbidden"
source_modules = ["src.features.*.domain"]
forbidden_modules = ["fastapi", "sqlalchemy"]

[[tool.importlinter.contracts]]
name = "application 계층은 FastAPI/SQLAlchemy를 모른다 (포트 뒤 유스케이스)"
type = "forbidden"
source_modules = ["src.features.*.application"]
forbidden_modules = ["fastapi", "sqlalchemy"]

[[tool.importlinter.contracts]]
name = "engine은 features를 모른다 (순수 엔진, feature 비의존)"
type = "forbidden"
source_modules = ["src.engine"]
forbidden_modules = ["src.features"]
