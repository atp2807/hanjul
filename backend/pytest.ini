[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
filterwarnings =
    # pydantic 2.13 × Python 3.14 조합의 cosmetic 경고 (alias_generator + 기본값 필드).
    # 기능엔 영향 없음(camelCase 직렬화 테스트로 검증). 실제 런타임은 Python 3.12 + pydantic 2.9.
    ignore::pydantic.warnings.UnsupportedFieldAttributeWarning
    # pytest-asyncio 0.24 가 Python 3.14 에서 내는 내부 deprecation (우리 코드 아님)
    ignore:.*event_loop_policy.*:DeprecationWarning
    ignore:.*iscoroutinefunction.*:DeprecationWarning
