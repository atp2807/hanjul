[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
markers =
    live: 네트워크 + 실 자격증명이 필요한 실 연동 테스트 (opt-in 환경변수로만 실행, 평소 CI는 skip)
filterwarnings =
    # pydantic 2.13 × Python 3.14 조합의 cosmetic 경고 (alias_generator + 기본값 필드).
    # 기능엔 영향 없음(camelCase 직렬화 테스트로 검증). 실제 런타임/CI는 Python 3.12 + pydantic 2.9.
    # 클래스 직접 참조 금지 — 2.9 엔 그 클래스가 없어 설정 파싱이 깨짐(exit 4).
    # UserWarning 하위라 모듈 스코프로 무시: 2.13 엔 적용, 2.9 엔 무해(미발생).
    ignore::UserWarning:pydantic
    # pytest-asyncio 0.24 가 Python 3.14 에서 내는 내부 deprecation (우리 코드 아님)
    ignore:.*event_loop_policy.*:DeprecationWarning
    ignore:.*iscoroutinefunction.*:DeprecationWarning
