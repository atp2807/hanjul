<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>결제</title>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
    }
    .wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 16px;
    }
    #payment-method, #agreement { width: 100%; }
    .btn-wrapper { padding: 16px 0; width: 100%; }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    .btn.primary { background-color: #2563eb; color: #ffffff; }
    .btn.primary:disabled { background-color: #d1d5db; cursor: not-allowed; }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; color: #6b7280; font-size: 14px; }
    .error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      text-align: center;
      padding: 20px;
    }
    .error-message { color: #ef4444; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="loading" class="loading-container">
      <div class="spinner"></div>
      <p class="loading-text">결제 수단을 불러오는 중...</p>
    </div>

    <div id="error" class="error-container">
      <p id="error-message" class="error-message"></p>
    </div>

    <div id="payment-method"></div>
    <div id="agreement"></div>

    <div class="btn-wrapper">
      <button id="payment-button" class="btn primary" disabled>결제하기</button>
    </div>
  </div>

  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var clientKey = urlParams.get('clientKey');
    var orderId = urlParams.get('orderId');
    var orderName = urlParams.get('orderName');
    var amount = parseInt(urlParams.get('amount'), 10);

    // 결제 완료 후 리다이렉트 감지 (iframe 모드)
    var paymentKey = urlParams.get('paymentKey');
    var errorCode = urlParams.get('code');
    var errorMessage = urlParams.get('message');

    if (paymentKey && window.parent !== window) {
      window.parent.postMessage({
        type: 'SUCCESS',
        paymentKey: paymentKey,
        orderId: urlParams.get('orderId'),
        amount: parseInt(urlParams.get('amount'), 10),
      }, '*');
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7280;">결제 처리 중...</div>';
    } else if (errorCode && window.parent !== window) {
      window.parent.postMessage({
        type: 'FAIL',
        code: errorCode,
        message: decodeURIComponent(errorMessage || '')
      }, '*');
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#ef4444;">결제 실패</div>';
    }

    var loadingEl = document.getElementById('loading');
    var errorEl = document.getElementById('error');
    var errorMsgEl = document.getElementById('error-message');
    var paymentButton = document.getElementById('payment-button');
    var widgets = null;

    async function initPayment() {
      if (paymentKey || errorCode) return;

      try {
        var tossPayments = TossPayments(clientKey);
        widgets = tossPayments.widgets({ customerKey: TossPayments.ANONYMOUS });

        await widgets.setAmount({ currency: 'KRW', value: amount });

        await Promise.all([
          widgets.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' }),
          widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' })
        ]);

        loadingEl.style.display = 'none';
        paymentButton.disabled = false;

        if (window.parent !== window) {
          window.parent.postMessage({ type: 'READY' }, '*');
        }
      } catch (error) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'flex';
        errorMsgEl.textContent = error.message || '결제 위젯을 불러올 수 없습니다.';

        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'ERROR',
            code: error.code || 'INIT_ERROR',
            message: error.message || '결제 위젯 초기화 실패'
          }, '*');
        }
      }
    }

    if (paymentButton) {
      paymentButton.addEventListener('click', async function() {
        if (!widgets) return;
        paymentButton.disabled = true;
        paymentButton.textContent = '처리 중...';

        try {
          var isInIframe = window.parent !== window;
          var selfUrl = window.location.origin + window.location.pathname;

          var successUrl = isInIframe
            ? selfUrl + '?orderId=' + encodeURIComponent(orderId)
            : window.location.href;
          var failUrl = isInIframe
            ? selfUrl + '?orderId=' + encodeURIComponent(orderId)
            : window.location.href;

          await widgets.requestPayment({
            orderId: orderId,
            orderName: orderName,
            successUrl: successUrl,
            failUrl: failUrl,
          });
        } catch (error) {
          if (error.code === 'USER_CANCEL' || error.code === 'PAY_PROCESS_CANCELED') {
            if (window.parent !== window) {
              window.parent.postMessage({ type: 'CANCEL', message: '결제가 취소되었습니다.' }, '*');
            }
          } else {
            if (window.parent !== window) {
              window.parent.postMessage({
                type: 'ERROR',
                code: error.code,
                message: error.message || '결제 요청 중 오류가 발생했습니다.'
              }, '*');
            }
          }
          paymentButton.disabled = false;
          paymentButton.textContent = '결제하기';
        }
      });
    }

    initPayment();
  </script>
</body>
</html>
