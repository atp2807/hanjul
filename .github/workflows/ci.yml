name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 백엔드 단위·통합 (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check src
      - run: python scripts/lint_naming.py
      - run: python -m pytest -q

  frontend:
    name: 프론트 컴포넌트 (vitest — web·potato)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      # 루트 install(workspace 링크). macOS 생성 lockfile은 리눅스 네이티브 optional
      # (@napi-rs/canvas-linux·rollup-linux)을 항목에서 누락 → npm ci/install 모두 skip(npm/cli#4828).
      # lockfile 삭제 후 install해야 리눅스에서 완전 재해석돼 네이티브 바이너리가 깔린다.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run test -w web
      - run: npm run test -w potato
      - run: npm run test -w packages/doc

  e2e:
    name: 브라우저 E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hanjul
          POSTGRES_PASSWORD: hanjul
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hanjul"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # e2e/db.js 가 읽는 접속정보 (postgres 서비스 컨테이너)
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: hanjul
      PGPASSWORD: hanjul
      PGDATABASE: postgres
      E2E_DB: hanjul_e2e
      BACKEND_PY: ${{ github.workspace }}/backend/.venv/bin/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: 백엔드 의존성 (asyncpg 포함)
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: psql 클라이언트 (createdb/dropdb)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: 프론트 의존성 (루트 install)
        # lockfile 삭제 후 install — 리눅스 네이티브 optional dep 정상 설치(npm/cli#4828)
        run: rm -f package-lock.json && npm install --no-audit --no-fund
      - name: Playwright 브라우저 (web workspace)
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: E2E 실행
        working-directory: web
        run: npm run e2e

      - name: 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
