name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: 백엔드 단위·통합 (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -q

  web:
    name: 프론트 컴포넌트 (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test

  e2e:
    name: 브라우저 E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hanjul
          POSTGRES_PASSWORD: hanjul
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hanjul"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # e2e/db.js 가 읽는 접속정보 (postgres 서비스 컨테이너)
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: hanjul
      PGPASSWORD: hanjul
      PGDATABASE: postgres
      E2E_DB: hanjul_e2e
      BACKEND_PY: ${{ github.workspace }}/backend/.venv/bin/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: 백엔드 의존성 (asyncpg 포함)
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: psql 클라이언트 (createdb/dropdb)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: 프론트 의존성 + 브라우저
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E 실행
        working-directory: web
        run: npm run e2e

      - name: 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
