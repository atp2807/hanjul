services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hanjul
      POSTGRES_PASSWORD: hanjul
      POSTGRES_DB: hanjul
    ports:
      - "5432:5432"
    volumes:
      - hanjul_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanjul"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hanjul_pg:
